spring.application.name=HotelProject

#spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
#spring.jpa.hibernate.ddl-auto=none
server.port=8082

#SQL Server DataSource Setting


#Spring Data JPA Setting
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.security.user.name=user
spring.security.user.password=1234

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=finalproject;encrypt=false;trustServerCertificate=true
spring.datasource.username=hotel_app
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true